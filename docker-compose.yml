services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: lifeboard
      POSTGRES_PASSWORD: lifeboard
      POSTGRES_DB: lifeboard
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lifeboard"]
      interval: 5s
      timeout: 5s
      retries: 5

  ezbookkeeping:
    image: mayswind/ezbookkeeping:1.3.2
    container_name: ezbookkeeping
    ports:
      - "8080:8080"
    volumes:
      - ./ezbookkeeping-data:/ezbookkeeping/data
    restart: unless-stopped
    environment:
      - TZ=Asia/Shanghai
      - EBK_SECURITY_ENABLE_API_TOKEN=true

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql+asyncpg://lifeboard:lifeboard@db:5432/lifeboard
      EZBOOKKEEPING_BASE_URL: "http://ezbookkeeping:8080"
      EZBOOKKEEPING_TOKEN: "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJ1c2VyVG9rZW5JZCI6IjIzNDc3OTM5ODYzOTI3NzUyNzUiLCJqdGkiOiIzNzc4OTU4MzcxNzMwNzUxNDg4IiwidXNlcm5hbWUiOiJ3enkiLCJ0eXBlIjo4LCJpYXQiOjE3Nzk1OTgzMzUsImV4cCI6MTEwMDI5NzAzNzJ9.Z-1g3rm2ax-bO_hA5Ovx__mGuKcXRSJOPKuC6h09bWk"
    depends_on:
      db:
        condition: service_healthy
      ezbookkeeping:
        condition: service_started
    volumes:
      - ./backend:/app

  frontend:
    build: ./frontend
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  pgdata:
